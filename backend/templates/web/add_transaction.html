{% extends "base.html" %}

{% block title %}{% if txn_type == 'expense' %}Add Expense{% else %}Add Income{% endif %} — PocketSense{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">
        {% if txn_type == 'expense' %}➖ Add Expense{% else %}➕ Add Income{% endif %}
    </h1>
</div>

<div class="card" style="max-width: 500px;">
    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="type" value="{{ txn_type }}">

        <div class="form-group">
            <label class="form-label" for="title">Title</label>
            <input type="text" id="title" name="title" class="form-control"
                   placeholder="{% if txn_type == 'expense' %}What did you spend on?{% else %}Where's the money from?{% endif %}"
                   required autofocus>
        </div>

        <div class="form-group">
            <label class="form-label" for="amount">Amount (₹)</label>
            <input type="number" id="amount" name="amount" class="form-control"
                   placeholder="0.00" step="0.01" min="0.01" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="category">Category</label>
            <select id="category" name="category" class="form-control">
                <option value="">— Select Category —</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}"
                            {% if txn_type == 'income' and cat.name == 'Income' %}selected{% endif %}>
                        {{ cat.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="form-label" for="date">Date</label>
            <input type="date" id="date" name="transaction_date" class="form-control"
                   value="{{ today }}" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="description">Notes (optional)</label>
            <textarea id="description" name="description" class="form-control"
                      rows="2" placeholder="Any extra details..."></textarea>
        </div>

        <div style="display: flex; gap: 0.75rem; margin-top: 1.5rem;">
            <button type="submit" class="btn {% if txn_type == 'expense' %}btn-danger{% else %}btn-primary{% endif %} btn-block">
                {% if txn_type == 'expense' %}Record Expense{% else %}Record Income{% endif %}
            </button>
        </div>
    </form>
</div>
{% endblock %}

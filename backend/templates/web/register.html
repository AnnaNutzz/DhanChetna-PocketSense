{% extends "auth_base.html" %}

{% block title %}Sign Up — PocketSense{% endblock %}
{% block auth_title %}Create Account{% endblock %}
{% block auth_subtitle %}Start tracking your expenses today{% endblock %}

{% block auth_content %}
<form method="post" autocomplete="on">
    {% csrf_token %}
    <div class="form-group">
        <label class="form-label" for="first_name">Name</label>
        <input type="text" id="first_name" name="first_name" class="form-control"
               placeholder="Your name" required autofocus>
    </div>
    <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control"
               placeholder="Choose a username" required>
    </div>
    <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="your@email.com" required>
    </div>
    <div class="form-group">
        <label class="form-label" for="password1">Password</label>
        <input type="password" id="password1" name="password1" class="form-control"
               placeholder="Create a password" required minlength="8">
    </div>
    <div class="form-group">
        <label class="form-label" for="password2">Confirm Password</label>
        <input type="password" id="password2" name="password2" class="form-control"
               placeholder="Confirm your password" required>
    </div>

    <button type="submit" class="btn btn-primary btn-block" style="margin-top: 0.5rem;">
        Create Account
    </button>
</form>

<div class="auth-footer">
    Already have an account? <a href="{% url 'web:login' %}">Sign In</a>
</div>
{% endblock %}
